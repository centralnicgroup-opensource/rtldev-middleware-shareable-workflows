name: Daily Node dependency refresh

on:
  workflow_call:
    inputs:
      base-ref:
        description: Branch to update and use as the pull request base. Defaults to the caller repository default branch.
        required: false
        type: string
      pull-request-branch:
        description: Branch name used for the dependency refresh pull request.
        required: false
        type: string
        default: automation/daily-node-dependency-refresh
      commit-message:
        description: Commit message for dependency refresh changes.
        required: false
        type: string
        default: "chore(deps): refresh node dependencies"
      pull-request-title:
        description: Pull request title for dependency refresh changes.
        required: false
        type: string
        default: "chore(deps): refresh node dependencies"
      pull-request-body:
        description: Pull request body for dependency refresh changes.
        required: false
        type: string
        default: |
          ## Summary
          - update package.json with npm-check-updates patch and minor releases
          - remove pnpm install state and regenerate pnpm-lock.yaml with pnpm update
          - allow the test workflow to enable auto-merge after checks pass

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.base-ref || github.event.repository.default_branch }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ vars.RTLDEV_MW_CI_NODE_VERSION }}
          check-latest: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Refresh package.json and pnpm lockfile
        run: |
          npx --yes npm-check-updates -u --packageManager pnpm --target minor --rejectVersion '/^(?:github:|git(?:\+|:)|file:|link:|workspace:|portal:|patch:|https?:|ssh:)/'
          rm -rf node_modules .pnpm-store
          rm -f pnpm-lock.yaml
          pnpm update --ignore-scripts

      - name: Create pull request
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.RTLDEV_MW_CI_TOKEN }}
          branch: ${{ inputs.pull-request-branch }}
          base: ${{ inputs.base-ref || github.event.repository.default_branch }}
          delete-branch: true
          commit-message: ${{ inputs.commit-message }}
          title: ${{ inputs.pull-request-title }}
          body: ${{ inputs.pull-request-body }}
