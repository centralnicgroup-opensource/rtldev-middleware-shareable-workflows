name: Daily Node dependency refresh

on:
  workflow_call:
    inputs:
      base-ref:
        description: Branch to update and use as the pull request base. Defaults to the caller repository default branch.
        required: false
        type: string
      node-version:
        description: Node.js version used to refresh dependencies.
        required: false
        type: string
        default: "24"
      pnpm-version:
        description: pnpm version used to refresh dependencies.
        required: false
        type: string
        default: "10"
      pull-request-branch:
        description: Branch name used for the dependency refresh pull request.
        required: false
        type: string
        default: automation/daily-node-dependency-refresh
      commit-message:
        description: Commit message for dependency refresh changes.
        required: false
        type: string
        default: "chore(deps): refresh node dependencies"
      pull-request-title:
        description: Pull request title for dependency refresh changes.
        required: false
        type: string
        default: "chore(deps): refresh node dependencies"
      pull-request-body:
        description: Pull request body for dependency refresh changes.
        required: false
        type: string
        default: |
          ## Summary
          - update package.json with npm-check-updates patch and minor releases
          - remove pnpm install state and regenerate pnpm-lock.yaml with pnpm update
          - enable auto-merge after repository checks pass
      auto-merge:
        description: Enable auto-merge for the dependency refresh pull request.
        required: false
        type: boolean
        default: true
      merge-method:
        description: Auto-merge method to use.
        required: false
        type: string
        default: squash
    secrets:
      MERGE_AUTOMATION_TOKEN:
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.base-ref || github.event.repository.default_branch }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          check-latest: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}

      - name: Refresh package.json and pnpm lockfile
        run: |
          npx --yes npm-check-updates@22 -u --packageManager pnpm --target minor --rejectVersion '/^(?:github:|git(?:\+|:)|file:|link:|workspace:|portal:|patch:|https?:|ssh:)/'
          rm -rf node_modules .pnpm-store
          rm -f pnpm-lock.yaml
          pnpm update --ignore-scripts

      - name: Create pull request
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.MERGE_AUTOMATION_TOKEN || github.token }}
          branch: ${{ inputs.pull-request-branch }}
          base: ${{ inputs.base-ref || github.event.repository.default_branch }}
          delete-branch: true
          commit-message: ${{ inputs.commit-message }}
          title: ${{ inputs.pull-request-title }}
          body: ${{ inputs.pull-request-body }}

      - name: Enable auto-merge
        if: ${{ inputs.auto-merge && steps.create-pr.outputs.pull-request-number != '' }}
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.RTLDEV_MW_CI_TOKEN }}
          pull-request-number: ${{ steps.create-pr.outputs.pull-request-number }}
          merge-method: ${{ inputs.merge-method }}
