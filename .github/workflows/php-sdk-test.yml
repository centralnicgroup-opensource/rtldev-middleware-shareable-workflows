name: Coverage & Tests
on:
  workflow_call:
    inputs:
      ref:
        description: "Commit SHA to check out (pass github.event.workflow_run.head_sha when triggered via workflow_run)"
        type: string
        required: false
        default: ""

jobs:
  test_matrix:
    name: 🧪 Testing
    runs-on: ${{ vars.RTLDEV_MW_CI_OS }}
    permissions:
      contents: read
    strategy:
      matrix:
        php-version: ${{ fromJson(vars.RTLDEV_MW_CI_PHP_MATRIX) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          persist-credentials: false
      - name: Install PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: xdebug
      - name: Install Dependencies::PHP${{ matrix.php-version }}
        run: |
          echo "$HOME/.composer/vendor/bin" >> "$GITHUB_PATH"
          composer update
      - name: Code Validation & Coverage
        env:
          RTLDEV_MW_CI_USER_CNR: ${{ secrets.RTLDEV_MW_CI_USER_CNR }}
          RTLDEV_MW_CI_USERPASSWORD_CNR: ${{ secrets.RTLDEV_MW_CI_USERPASSWORD_CNR }}
          RTLDEV_MW_CI_ROLE_CNR: ${{ secrets.RTLDEV_MW_CI_ROLE_CNR }}
          RTLDEV_MW_CI_ROLEPASSWORD_CNR: ${{ secrets.RTLDEV_MW_CI_ROLEPASSWORD_CNR }}
          RTLDEV_MW_CI_USER_IBS: ${{ secrets.RTLDEV_MW_CI_USER_IBS }}
          RTLDEV_MW_CI_USERPASSWORD_IBS: ${{ secrets.RTLDEV_MW_CI_USERPASSWORD_IBS }}
          RTLDEV_MW_CI_USER_MONIKER: ${{ secrets.RTLDEV_MW_CI_USER_MONIKER }}
          RTLDEV_MW_CI_USERPASSWORD_MONIKER: ${{ secrets.RTLDEV_MW_CI_USERPASSWORD_MONIKER }}
        run: composer run-script test

  dependabot:
    needs:
      - test_matrix
    if: ${{ needs.test_matrix.result == 'success' }}
    uses: ./.github/workflows/auto-merge-dependabot-pr.yml
    secrets: inherit
    permissions:
      contents: write
      pull-requests: write