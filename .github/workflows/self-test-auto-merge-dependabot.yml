name: Dependabot auto-merge - Self
on:
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  tests:
    name: 🧪 Linting
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false
      - name: Lint GitHub Actions
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
      - name: Lint Markdown
        run: |
          mapfile -d '' markdown_files < <(git ls-files -z -- '*.md' '*.markdown')
          if ((${#markdown_files[@]} == 0)); then
            echo "No Markdown files to lint."
            exit 0
          fi
          npx --yes markdownlint-cli2@0.18.1 "${markdown_files[@]}"

  dependabot:
    needs:
      - tests
    uses: ./.github/workflows/auto-merge-dependabot-pr.yml
    secrets: inherit
    permissions:
      contents: write
      pull-requests: write
