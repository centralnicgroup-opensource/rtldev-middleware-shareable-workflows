name: Linting & Coverage
on:
  workflow_call:

jobs:
  lint:
    name: 🧪 Linting
    runs-on: ${{ vars.RTLDEV_MW_CI_OS }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest
      - name: Setup NodeJS @ ${{ vars.RTLDEV_MW_CI_NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ vars.RTLDEV_MW_CI_NODE_VERSION }}
          check-latest: true
          cache: pnpm
      - name: Install node dependencies
        run: pnpm i --frozen-lockfile
      - name: Linting
        run: pnpm run lint

  test_matrix:
    strategy:
      matrix:
        node-version:
          - ${{ vars.RTLDEV_MW_CI_NODE_VERSION }}

    name: 🧪 Testing
    runs-on: ${{ vars.RTLDEV_MW_CI_OS }}
    needs: lint
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest
      - name: Use NodeJS @ ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          check-latest: true
          cache: pnpm
      - name: Install dependencies
        run: pnpm i --frozen-lockfile
      - name: Run test
        run: pnpm run test --silent >/dev/null

  dependabot:
    needs:
      - test_matrix
      - lint
    if: ${{ needs.lint.result == 'success' && needs.test_matrix.result == 'success' }}
    uses: ./.github/workflows/auto-merge-dependabot-pr.yml
    secrets: inherit
    permissions:
      contents: write
      pull-requests: write
