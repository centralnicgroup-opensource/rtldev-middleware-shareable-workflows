name: Linting & Coverage
on:
  workflow_call:

jobs:
  lint:
    name: 🧪 Linting
    runs-on: ${{ vars.RTLDEV_MW_CI_OS }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version: "${{ vars.RTLDEV_MW_CI_GOLANG_VERSION }}"
          check-latest: true
      - name: Run Go linter
        uses: golangci/golangci-lint-action@v9.3.0
        with:
          version: v2.12.2
          args: --config .github/linters/.golangci.yml ./...
      - name: Install shellcheck
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y shellcheck
          fi
      - name: Run shell linter
        run: |
          find . -name '*.sh' \
            -not -path './node_modules/*' \
            -not -path './.git/*' \
            -not -path './rtldev-middleware-dnscontrol/*' \
            -print0 | xargs -0 --no-run-if-empty shellcheck

  test_matrix:
    name: 🧪 Testing
    runs-on: ${{ vars.RTLDEV_MW_CI_OS }}
    needs: lint
    strategy:
      matrix:
        go-version: ${{ fromJson(vars.RTLDEV_MW_CI_GOLANG_MATRIX) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: true
      - name: Run build
        run: go build ./... && go vet ./...
      - name: Running automated tests
        env:
          CNR_TEST_USER: ${{ secrets.RTLDEV_MW_CI_USER_CNR }}
          CNR_TEST_PASSWORD: ${{ secrets.RTLDEV_MW_CI_USERPASSWORD_CNR }}
        run: |
          go test -v -race -coverprofile=coverage.out ./...
          go tool cover -html=coverage.out -o coverage.html

  dependabot:
    needs:
      - test_matrix
      - lint
    if: ${{ needs.lint.result == 'success' && needs.test_matrix.result == 'success' }}
    uses: ./.github/workflows/auto-merge-dependabot-pr.yml
    secrets: inherit
    permissions:
      contents: write
      pull-requests: write